name: sigem

services:
  mongo:
    image: mongo:7
    container_name: sigem-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--host",
          "localhost",
          "--quiet",
          "--eval",
          "db.adminCommand('ping').ok",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - sigem-network

  api-gateway:
    build:
      context: ../..
      dockerfile: infra/docker/api-gateway.Dockerfile
    container_name: sigem-api-gateway
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      PORT: 4000
      NODE_ENV: production
      MONGO_URL: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DATABASE}?authSource=admin
      NOTIF_SERVICE_URL: http://notification-service:4001
      INVENTORY_SERVICE_URL: http://inventory-service:4002
      VEHICLE_SERVICE_URL: http://vehicle-service:4003
      REFERENCE_SERVICE_URL: http://reference-service:4006
      PROVIDER_SERVICE_URL: http://provider-service:4010
    ports:
      - "${API_GATEWAY_PORT:-4000}:4000"
    depends_on:
      mongo:
        condition: service_healthy
      inventory-service:
        condition: service_started
      vehicle-service:
        condition: service_started
    networks:
      - sigem-network

  inventory-service:
    build:
      context: ../..
      dockerfile: infra/docker/inventory-service.Dockerfile
    container_name: sigem-inventory-service
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      PORT: 4002
      NODE_ENV: production
      MONGO_URL: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DATABASE}?authSource=admin
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "4002"
    networks:
      - sigem-network

  vehicle-service:
    build:
      context: ../..
      dockerfile: infra/docker/vehicle-service.Dockerfile
    container_name: sigem-vehicle-service
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      PORT: 4003
      NODE_ENV: production
      MONGO_URL: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DATABASE}?authSource=admin
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "4003"
    networks:
      - sigem-network

volumes:
  mongo_data:

networks:
  sigem-network:
    driver: bridge
